version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: finansradar_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      # Data volume to persist SQLite db independently if needed
      - sqlite_data:/app/prisma
    ports:
      - "3001:3001"
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=file:./dev.db
      - REDIS_URL=redis://redis:6379
    command: sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      - redis

  frontend:
    image: node:20-alpine
    container_name: finansradar_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001/api
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    container_name: finansradar_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  sqlite_data:
  redis_data:
